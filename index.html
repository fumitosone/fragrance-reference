<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fragrance Reference Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style> 
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #f5f1ea;      /* 温かいクリーム色の背景 */
      --bg-soft:       #faf7f1;
      --card-bg:       #ffffff;
      --ink:           #2a241e;      /* 深い温かみのある黒 */
      --ink-strong:    #1a1612;
      --ink-muted:     #8a8278;
      --ink-soft:      #b3a99a;
      --accent:        #a5762e;      /* 琥珀色 - 白地でコントラスト十分 */
      --accent-dark:   #7a5520;
      --accent-light:  #d4b378;
      --accent-pale:   #f0e5cc;
      --border:        #e8e2d5;
      --border-strong: #d4cab5;
      --divider:       #ece6d8;
      --shadow:        0 2px 12px rgba(42, 36, 30, 0.06);
      --shadow-hover:  0 12px 40px rgba(42, 36, 30, 0.12);
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Sans', 'Noto Serif JP', sans-serif;
      font-weight: 400;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ═══════════════ LOCK SCREEN ═══════════════ */
    #lock-screen {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      background: radial-gradient(ellipse at 50% 40%, var(--bg-soft) 0%, var(--bg) 70%);
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #lock-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .lock-box {
      width: min(400px, 90vw);
      text-align: center;
      animation: fadeUp 0.8s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .lock-emblem {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      letter-spacing: 0.35em;
      color: var(--accent-dark);
      text-transform: uppercase;
      margin-bottom: 16px;
      font-weight: 500;
    }
    .lock-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(32px, 6vw, 48px);
      font-weight: 300;
      color: var(--ink-strong);
      line-height: 1.1;
      margin-bottom: 10px;
      letter-spacing: 0.01em;
    }
    .lock-title em { color: var(--accent); }
    .lock-sub {
      font-size: 11px;
      letter-spacing: 0.28em;
      color: var(--ink-muted);
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    .lock-divider {
      width: 48px; height: 1px;
      background: var(--accent);
      margin: 0 auto 48px;
      position: relative;
    }
    .lock-divider::before, .lock-divider::after {
      content: ''; position: absolute; top: -2px;
      width: 4px; height: 4px; border-radius: 50%; background: var(--accent);
    }
    .lock-divider::before { left: -8px; }
    .lock-divider::after  { right: -8px; }

    .pw-field {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border-strong);
      border-radius: 2px;
      padding: 14px 18px;
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      letter-spacing: 0.15em;
      text-align: center;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      margin-bottom: 14px;
    }
    .pw-field::placeholder { color: var(--ink-soft); letter-spacing: 0.1em; font-size: 13px; }
    .pw-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(165, 118, 46, 0.08); }
    .pw-field.error { border-color: #b54848; color: #8a2e2e; animation: shake 0.4s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }

    .pw-btn {
      width: 100%;
      padding: 13px;
      background: var(--ink-strong);
      border: 1px solid var(--ink-strong);
      border-radius: 2px;
      color: #f5f1ea;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      letter-spacing: 0.3em;
      font-weight: 500;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s;
    }
    .pw-btn:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
    .pw-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .pw-status { margin-top: 16px; font-size: 12px; color: var(--ink-muted); min-height: 18px; letter-spacing: 0.02em; }
    .pw-status.err { color: #b54848; }

    /* ═══════════════ MAIN APP ═══════════════ */
    #app {
      opacity: 0;
      transition: opacity 0.6s ease 0.2s;
      min-height: 100vh;
    }
    #app.visible { opacity: 1; }

    header {
      position: sticky; top: 0; z-index: 50;
      border-bottom: 1px solid var(--border);
      background: rgba(245, 241, 234, 0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 32px;
      flex-wrap: wrap;
    }
    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 500;
      color: var(--ink-strong);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }
    .header-title em {
      font-style: italic;
      color: var(--accent);
      font-weight: 400;
    }

    .search-wrap { flex: 1; min-width: 200px; position: relative; }
    .search-icon {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--ink-muted);
      font-size: 15px;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border-strong);
      border-radius: 2px;
      padding: 10px 14px 10px 38px;
      color: var(--ink);
      font-family: 'DM Sans', 'Noto Serif JP', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .search-input::placeholder { color: var(--ink-soft); }
    .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(165, 118, 46, 0.08); }

    .result-count {
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--ink-muted);
      text-transform: uppercase;
      white-space: nowrap;
      font-weight: 500;
    }

    .filter-bar {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }
    .filter-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      flex: 1;
      min-width: 0;
    }
    .pill {
      padding: 5px 14px;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      cursor: pointer;
      transition: all 0.2s;
      background: var(--card-bg);
      white-space: nowrap;
      font-weight: 500;
    }
    .pill:hover { border-color: var(--accent); color: var(--accent-dark); }
    .pill.active {
      background: var(--ink-strong);
      border-color: var(--ink-strong);
      color: var(--bg);
    }

    /* ─── View Toggle ─── */
    .view-toggle {
      display: flex;
      border: 1px solid var(--border-strong);
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .view-btn {
      background: var(--card-bg);
      border: none;
      padding: 7px 11px;
      cursor: pointer;
      color: var(--ink-muted);
      transition: background 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--border-strong);
    }
    .view-btn:last-child { border-right: none; }
    .view-btn:hover { color: var(--accent-dark); }
    .view-btn.active {
      background: var(--ink-strong);
      color: var(--bg);
    }
    .view-btn svg { width: 16px; height: 16px; display: block; }

    /* ═══════════════ GRID ═══════════════ */
    .grid {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 32px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(600px, 1fr));
      gap: 28px;
    }

    .no-results {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--ink-muted);
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
    }

    /* ═══════════════ LIST VIEW ═══════════════ */
    .list {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 32px 60px;
      display: flex;
      flex-direction: column;
    }
    .list-header {
      display: grid;
      grid-template-columns: 72px 1.5fr 2fr auto;
      gap: 20px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border-strong);
      background: var(--bg-soft);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-muted);
      font-weight: 600;
      position: sticky;
      top: 68px;
      z-index: 10;
    }
    .list-header .list-col-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(75px, 1fr));
      gap: 12px;
    }

    .list-row {
      display: grid;
      grid-template-columns: 72px 1.5fr 2fr auto;
      gap: 20px;
      padding: 14px 20px;
      align-items: center;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.18s, transform 0.18s;
      background: var(--card-bg);
      animation: cardIn 0.3s ease both;
    }
    .list-row:hover {
      background: var(--bg-soft);
    }

    .list-thumb {
      position: relative;
      width: 72px;
      height: 72px;
      border-radius: 3px;
      overflow: hidden;
      background: linear-gradient(135deg, #f0e8d8 0%, #e0d4bc 100%);
      flex-shrink: 0;
    }
    .list-thumb img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .list-thumb-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: rgba(42, 36, 30, 0.35);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 10px;
      letter-spacing: 0.1em;
    }

    .list-main { min-width: 0; }
    .list-furigana {
      font-family: 'Noto Serif JP', serif;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--accent-dark);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .list-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--ink-strong);
      letter-spacing: 0.01em;
      line-height: 1.1;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .list-type-tags {
      display: flex; gap: 5px;
      flex-wrap: wrap;
    }
    .list-type-tags .type-tag {
      padding: 2px 8px;
      font-size: 9px;
      letter-spacing: 0.12em;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }
    .list-type-tags .type-tag.category { background: #ffa53c; color: #2a1a00; }
    .list-type-tags .type-tag.type { background: #64b4a0; color: #002a22; }

    .list-descriptors {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      min-width: 0;
      overflow: hidden;
      max-height: 52px;
    }
    .list-descriptors .tag {
      padding: 2px 9px;
      font-size: 10.5px;
    }

    .list-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(75px, 1fr));
      gap: 12px;
      flex-shrink: 0;
    }
    .list-stat-cell {
      min-width: 0;
    }
    .list-stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-strong);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .list-stat-value.mono {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
    }
    .list-stat-sub {
      font-size: 10px;
      color: var(--ink-muted);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .list-empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--ink-muted);
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
    }

    /* ═══════════════ CARD (horizontal) ═══════════════ */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.3s, transform 0.25s, box-shadow 0.3s;
      animation: cardIn 0.4s ease both;
      display: grid;
      grid-template-columns: 42% 1fr;
      min-height: 340px;
      box-shadow: var(--shadow);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card:hover {
      border-color: var(--border-strong);
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    /* ─── 左ペイン: 画像 + 香料名オーバーレイ ─── */
    .card-image {
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #f0e8d8 0%, #e0d4bc 100%);
      min-height: 100%;
    }
    .card-image img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.7s ease;
    }
    .card:hover .card-image img { transform: scale(1.05); }

    .card-image::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(26, 22, 18, 0.85) 100%);
      pointer-events: none;
    }

    .card-image-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255, 255, 255, 0.7);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 14px;
      letter-spacing: 0.15em;
      z-index: 1;
    }

    .card-titleblock {
      position: absolute;
      left: 22px;
      bottom: 20px;
      right: 22px;
      z-index: 2;
      color: #ffffff;
    }
    .card-furigana {
      font-family: 'Noto Serif JP', serif;
      font-size: 11.5px;
      letter-spacing: 0.08em;
      color: #f0d9a0;
      margin-bottom: 3px;
      font-weight: 400;
      text-shadow: 0 1px 8px rgba(0,0,0,0.5);
    }
    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 500;
      letter-spacing: 0.01em;
      line-height: 1.05;
      margin-bottom: 10px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    }
    .card-type-tags {
      display: flex; gap: 6px;
      flex-wrap: wrap;
    }
    .type-tag {
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .type-tag.category { background: rgba(255, 165, 60, 0.85); color: #2a1a00; }
    .type-tag.type {
      background: rgba(100, 180, 160, 0.85);
      color: #002a22;
    }

    /* ─── 右ペイン: コンテンツ ─── */
    .card-content {
      padding: 22px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: hidden;
    }

    .card-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--divider);
    }
    .stat {
      min-width: 0;
    }
    .stat-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 3px;
      font-weight: 500;
    }
    .stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      color: var(--ink-strong);
      font-weight: 500;
      line-height: 1.15;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .stat-sub {
      font-size: 10px;
      color: var(--ink-muted);
      margin-top: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Odor Descriptors */
    .section-label {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-muted);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .tags {
      display: flex; flex-wrap: wrap; gap: 5px;
    }
    .tag {
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: 0.03em;
      color: var(--ink);
      background: var(--accent-pale);
      border: 1px solid transparent;
      font-weight: 400;
    }

    /* Description preview */
    .desc-preview {
      font-family: 'Noto Serif JP', serif;
      font-size: 13px;
      line-height: 1.85;
      color: var(--ink);
      font-weight: 400;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      letter-spacing: 0.02em;
    }

    /* Blends preview */
    .blends-row {
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--divider);
    }
    .blends {
      display: flex; flex-wrap: wrap; gap: 4px;
    }
    .blend-tag {
      padding: 2px 9px;
      border-radius: 2px;
      font-size: 10px;
      letter-spacing: 0.04em;
      color: var(--accent-dark);
      background: var(--bg-soft);
      border: 1px solid var(--border);
      font-weight: 400;
    }
    .blend-tag.more {
      background: transparent;
      border-color: var(--border-strong);
      color: var(--ink-muted);
    }

    /* ═══════════════ MODAL ═══════════════ */
    #modal-overlay {
      position: fixed; inset: 0;
      background: rgba(42, 36, 30, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
    }
    #modal-overlay.open { opacity: 1; visibility: visible; }

    .modal {
      background: var(--card-bg);
      border-radius: 4px;
      width: min(900px, 100%);
      max-height: 92vh;
      overflow-y: auto;
      transform: translateY(20px);
      transition: transform 0.3s;
      box-shadow: 0 24px 80px rgba(0,0,0,0.3);
      position: relative;
    }
    #modal-overlay.open .modal { transform: translateY(0); }

    .modal-top {
      position: relative;
      display: grid;
      grid-template-columns: 40% 1fr;
      min-height: 420px;
      border-bottom: 1px solid var(--border);
    }
    .modal-image {
      position: relative;
      background: linear-gradient(135deg, #f0e8d8 0%, #e0d4bc 100%);
      overflow: hidden;
    }
    .modal-image img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .modal-image-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: rgba(42, 36, 30, 0.5);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 15px;
      letter-spacing: 0.15em;
    }
    .modal-image::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(26, 22, 18, 0.88) 100%);
      pointer-events: none;
    }
    .modal-titleblock {
      position: absolute;
      left: 32px; bottom: 28px; right: 32px;
      color: #ffffff;
      z-index: 2;
    }
    .modal-furigana {
      font-family: 'Noto Serif JP', serif;
      font-size: 13px;
      letter-spacing: 0.1em;
      color: #f0d9a0;
      margin-bottom: 4px;
      text-shadow: 0 1px 8px rgba(0,0,0,0.5);
    }
    .modal-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: 0.01em;
      margin-bottom: 12px;
      text-shadow: 0 2px 16px rgba(0,0,0,0.6);
    }
    .modal-type-tags { display: flex; gap: 6px; }

    .modal-close {
      position: absolute; top: 20px; right: 20px; z-index: 3;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--border);
      color: var(--ink);
      width: 34px; height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .modal-close:hover { background: var(--accent); color: white; border-color: var(--accent); }

    /* 右ペイン (モーダル上部) */
    .modal-headpane {
      padding: 28px 32px;
      display: flex; flex-direction: column;
      gap: 22px;
      overflow: hidden;
    }
    .modal-cas {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--ink-muted);
      letter-spacing: 0.08em;
    }
    .modal-stats-mini {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    .modal-pane-descriptors {
      padding-top: 18px;
      border-top: 1px solid var(--divider);
    }
    .modal-stat-label {
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-muted);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .modal-stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      color: var(--ink-strong);
      font-weight: 500;
      line-height: 1.1;
    }
    .modal-stat-sub {
      font-size: 11px;
      color: var(--ink-muted);
      margin-top: 2px;
    }

    /* モーダル本文 */
    .modal-body { padding: 32px; }
    .modal-section { margin-bottom: 32px; }
    .modal-section:last-child { margin-bottom: 0; }

    .modal-section-title {
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent-dark);
      font-weight: 600;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--divider);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .modal-section-title .count {
      font-family: 'DM Mono', monospace;
      color: var(--ink-muted);
      text-transform: none;
      letter-spacing: 0.05em;
      font-size: 10px;
      font-weight: 400;
    }

    .ja-text {
      font-family: 'Noto Serif JP', serif;
      font-size: 15px;
      line-height: 2;
      color: var(--ink);
      font-weight: 400;
      letter-spacing: 0.03em;
    }

    /* ═══════════════ RESPONSIVE ═══════════════ */
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }

      /* リストビューをタブレットサイズ以下で2行構成に */
      .list-header { display: none; }
      .list-row {
        grid-template-columns: 64px 1fr;
        grid-template-rows: auto auto;
        gap: 14px;
        padding: 14px 16px;
      }
      .list-thumb { width: 64px; height: 64px; }
      .list-descriptors {
        grid-column: 2 / 3;
        grid-row: 2;
      }
      .list-stats {
        grid-column: 1 / -1;
        grid-row: 3;
        grid-template-columns: repeat(4, 1fr);
        padding-top: 10px;
        border-top: 1px dashed var(--border);
      }
    }
    @media (max-width: 640px) {
      .header-inner { padding: 16px 20px; }
      .filter-bar { padding: 12px 20px; }
      .grid { padding: 24px 20px; }
      .list { padding: 16px 8px 40px; }

      /* カードを縦並びに切り替え */
      .card { grid-template-columns: 1fr; min-height: 0; }
      .card-image { aspect-ratio: 16 / 10; min-height: 0; }
      .card-stats { grid-template-columns: repeat(2, 1fr); }

      /* リスト: スタッツを2列に */
      .list-stats { grid-template-columns: repeat(2, 1fr); gap: 8px; }

      /* モーダル */
      .modal-top { grid-template-columns: 1fr; min-height: 0; }
      .modal-image { aspect-ratio: 16 / 10; }
      .modal-headpane { padding: 22px 20px; }
      .modal-stats-mini { grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .modal-stat-value { font-size: 18px; }
      .modal-body { padding: 22px 20px; }
      .modal-titleblock { left: 22px; bottom: 18px; right: 22px; }
      .modal-name { font-size: 28px; }
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent-light); }

    ::selection { background: var(--accent-pale); color: var(--ink-strong); }
  </style>
</head>
<body>

<!-- ═══════════════ LOCK SCREEN ═══════════════ -->
<div id="lock-screen">
  <div class="lock-box">
    <div class="lock-emblem">Fragrance Reference Library</div>
    <h1 class="lock-title">Restricted<br><em>Access</em></h1>
    <p class="lock-sub">Member-only catalogue</p>
    <div class="lock-divider"></div>
    <input type="password" id="pw-input" class="pw-field" placeholder="パスワードを入力" autocomplete="current-password">
    <button id="pw-btn" class="pw-btn">Enter</button>
    <div id="pw-status" class="pw-status"></div>
  </div>
</div>

<!-- ═══════════════ MAIN APP ═══════════════ -->
<div id="app">
  <header>
    <div class="header-inner">
      <div class="header-title">Fragrance <em>Reference</em> Library</div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="search" id="search-input" class="search-input" placeholder="香料名・フリガナ・CAS・ノートで検索…">
      </div>
      <div class="result-count" id="result-count"></div>
    </div>
  </header>

  <div class="filter-bar">
    <div class="filter-pills" id="filter-bar">
      <button class="pill active" data-filter="all">All</button>
    </div>
    <div class="view-toggle" role="group" aria-label="View mode">
      <button class="view-btn active" data-view="grid" aria-label="グリッド表示" title="グリッド表示">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
      </button>
      <button class="view-btn" data-view="list" aria-label="リスト表示" title="リスト表示">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <circle cx="4" cy="6" r="1.2" fill="currentColor"/>
          <circle cx="4" cy="12" r="1.2" fill="currentColor"/>
          <circle cx="4" cy="18" r="1.2" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="items-container" class="grid"></div>
</div>

<!-- ═══════════════ MODAL ═══════════════ -->
<div id="modal-overlay">
  <div class="modal">
    <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    <div class="modal-top">
      <div class="modal-image" id="m-image-wrap">
        <img id="m-image" alt="" style="display:none;">
        <div class="modal-image-placeholder" id="m-image-placeholder">no image</div>
        <div class="modal-titleblock">
          <div class="modal-furigana" id="m-furigana"></div>
          <div class="modal-name" id="m-name"></div>
          <div class="modal-type-tags">
            <span class="type-tag category" id="m-tag-category"></span>
            <span class="type-tag type" id="m-tag-type"></span>
          </div>
        </div>
      </div>
      <div class="modal-headpane">
        <div class="modal-cas" id="m-cas"></div>
        <div class="modal-stats-mini">
          <div>
            <div class="modal-stat-label">Volatility</div>
            <div class="modal-stat-value" id="m-vol"></div>
            <div class="modal-stat-sub" id="m-vol-pos"></div>
          </div>
          <div>
            <div class="modal-stat-label">Odor Impact</div>
            <div class="modal-stat-value" id="m-impact"></div>
            <div class="modal-stat-sub" id="m-impact-lv"></div>
          </div>
          <div>
            <div class="modal-stat-label">IFRA Limit</div>
            <div class="modal-stat-value" id="m-ifra"></div>
            <div class="modal-stat-sub" id="m-ifra-cat"></div>
          </div>
        </div>
        <div class="modal-pane-descriptors">
          <div class="modal-stat-label" style="margin-bottom:10px;">Odor Descriptors</div>
          <div class="tags" id="m-descriptors"></div>
        </div>
      </div>
    </div>

    <div class="modal-body">
      <div class="modal-section">
        <div class="modal-section-title">Description</div>
        <div class="ja-text" id="m-description"></div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Usage</div>
        <div class="ja-text" id="m-usage"></div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">
          <span>Blends With</span>
          <span class="count" id="m-blends-count"></span>
        </div>
        <div class="blends" id="m-blends"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   Web Crypto API : AES-256-GCM 復号
═══════════════════════════════════════════ */
const b64ToBytes = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey(
    'raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    baseKey,
    { name: 'AES-GCM', length: 256 },
    false, ['decrypt']
  );
}

async function decryptData(password, encObj) {
  const salt    = b64ToBytes(encObj.salt);
  const iv      = b64ToBytes(encObj.iv);
  const authTag = b64ToBytes(encObj.authTag);
  const data    = b64ToBytes(encObj.data);
  const ciphertext = new Uint8Array(data.length + authTag.length);
  ciphertext.set(data, 0);
  ciphertext.set(authTag, data.length);
  const key = await deriveKey(password, salt);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
  return JSON.parse(new TextDecoder().decode(plain));
}

/* ═══════════════════════════════════════════
   ロード & 認証
═══════════════════════════════════════════ */
let ENC_DATA = null;

async function loadEncData() {
  try {
    const res = await fetch('fragrances.enc.json');
    if (!res.ok) throw new Error('Not found');
    ENC_DATA = await res.json();
  } catch {
    document.getElementById('pw-status').textContent =
      '⚠ fragrances.enc.json が読み込めません。ローカルサーバー経由でアクセスしてください。';
  }
}

async function tryUnlock() {
  const btn   = document.getElementById('pw-btn');
  const input = document.getElementById('pw-input');
  const status = document.getElementById('pw-status');
  const pw = input.value;
  if (!pw || !ENC_DATA) return;

  btn.disabled = true;
  btn.textContent = '復号中…';
  status.textContent = '';
  status.className = 'pw-status';

  try {
    const fragrances = await decryptData(pw, ENC_DATA);
    document.getElementById('lock-screen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    initApp(fragrances);
  } catch {
    input.classList.add('error');
    status.textContent = 'パスワードが正しくありません';
    status.className = 'pw-status err';
    setTimeout(() => input.classList.remove('error'), 600);
    btn.disabled = false;
    btn.textContent = 'Enter';
  }
}

document.getElementById('pw-btn').addEventListener('click', tryUnlock);
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });

/* ═══════════════════════════════════════════
   アプリ本体
═══════════════════════════════════════════ */
let allFragrances = [];
let activeFilter  = 'all';
let searchQuery   = '';
let viewMode      = 'grid'; // 'grid' | 'list'

function initApp(data) {
  allFragrances = data;
  buildFilters();
  setupViewToggle();
  renderItems();
  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase();
    renderItems();
  });
}

function setupViewToggle() {
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const mode = btn.dataset.view;
      if (mode === viewMode) return;
      viewMode = mode;
      document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b === btn));
      renderItems();
    });
  });
}

function buildFilters() {
  const categories = [...new Set(allFragrances.map(f => f.category))].sort();
  const bar = document.getElementById('filter-bar');
  const allBtn = bar.querySelector('[data-filter="all"]');
  allBtn.addEventListener('click', () => {
    activeFilter = 'all';
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    allBtn.classList.add('active');
    renderItems();
  });
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'pill';
    btn.dataset.filter = cat;
    btn.textContent = cat;
    btn.addEventListener('click', () => {
      activeFilter = cat;
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      renderItems();
    });
    bar.appendChild(btn);
  });
}

function matchesSearch(f, q) {
  if (!q) return true;
  return [
    f.name, f.furigana, f.cas, f.category,
    ...(f.odorDescriptors || []),
    ...(f.blendsWith || []),
    f.description, f.usage,
    f.volatility?.position,
  ].some(s => s && s.toLowerCase().includes(q));
}

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

function renderItems() {
  const container = document.getElementById('items-container');
  container.innerHTML = '';
  container.className = viewMode === 'grid' ? 'grid' : 'list';

  const filtered = allFragrances.filter(f => {
    const catOk  = activeFilter === 'all' || f.category === activeFilter;
    const srchOk = matchesSearch(f, searchQuery);
    return catOk && srchOk;
  });

  document.getElementById('result-count').textContent = `${filtered.length} / ${allFragrances.length} 件`;

  if (filtered.length === 0) {
    const emptyClass = viewMode === 'grid' ? 'no-results' : 'list-empty';
    container.innerHTML = `<div class="${emptyClass}">該当する香料が見つかりません</div>`;
    return;
  }

  if (viewMode === 'list') {
    // リストヘッダー
    const header = document.createElement('div');
    header.className = 'list-header';
    header.innerHTML = `
      <div></div>
      <div>Name</div>
      <div>Odor Descriptors</div>
      <div class="list-col-stats">
        <div>Volatility</div>
        <div>Impact</div>
        <div>IFRA</div>
        <div>CAS</div>
      </div>
    `;
    container.appendChild(header);
  }

  filtered.forEach((f, i) => {
    const el = document.createElement('div');
    if (viewMode === 'grid') {
      el.className = 'card';
      el.innerHTML = buildCardHTML(f);
    } else {
      el.className = 'list-row';
      el.innerHTML = buildListRowHTML(f);
    }
    el.style.animationDelay = `${Math.min(i, 20) * 25}ms`;
    el.addEventListener('click', () => openModal(f));
    container.appendChild(el);
  });
}

function buildCardHTML(f) {
  const imageHtml = f.image
    ? `<img src="${esc(f.image)}" alt="${esc(f.name)}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
       <div class="card-image-placeholder" style="display:none;">no image</div>`
    : `<div class="card-image-placeholder">no image</div>`;

  return `
    <div class="card-image">
      ${imageHtml}
      <div class="card-titleblock">
        <div class="card-furigana">${esc(f.furigana || '')}</div>
        <div class="card-title">${esc(f.name)}</div>
        <div class="card-type-tags">
          <span class="type-tag category">${esc(f.category)}</span>
          <span class="type-tag type">${esc(f.type)}</span>
        </div>
      </div>
    </div>
    <div class="card-content">
      <div class="card-stats">
        <div class="stat">
          <div class="stat-label">Volatility</div>
          <div class="stat-value">${esc(f.volatility.position)}</div>
          <div class="stat-sub">${esc(f.volatility.time)}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Impact</div>
          <div class="stat-value">${esc(f.odorImpact.level)}</div>
          <div class="stat-sub">${esc(f.odorImpact.concentration)}</div>
        </div>
        <div class="stat">
          <div class="stat-label">IFRA</div>
          <div class="stat-value">${esc(f.ifraLimit.value)}</div>
          <div class="stat-sub">${esc(f.ifraLimit.category)}</div>
        </div>
        <div class="stat">
          <div class="stat-label">CAS</div>
          <div class="stat-value" style="font-family:'DM Mono',monospace;font-size:12px;">${esc(f.cas)}</div>
          <div class="stat-sub">${esc(f.casSource || '')}</div>
        </div>
      </div>
      <div>
        <div class="section-label">Odor Descriptors</div>
        <div class="tags">${f.odorDescriptors.map(d => `<span class="tag">${esc(d)}</span>`).join('')}</div>
      </div>
      ${f.description ? `<div class="desc-preview">${esc(f.description)}</div>` : ''}
      <div class="blends-row">
        <div class="section-label">Blends With · ${f.blendsWith.length}</div>
        <div class="blends">
          ${f.blendsWith.slice(0,6).map(b => `<span class="blend-tag">${esc(b)}</span>`).join('')}
          ${f.blendsWith.length > 6 ? `<span class="blend-tag more">+${f.blendsWith.length - 6}</span>` : ''}
        </div>
      </div>
    </div>
  `;
}

function buildListRowHTML(f) {
  const imageHtml = f.image
    ? `<img src="${esc(f.image)}" alt="${esc(f.name)}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
       <div class="list-thumb-placeholder" style="display:none;">no image</div>`
    : `<div class="list-thumb-placeholder">no image</div>`;

  // Odor descriptorsは最大6個に制限（表示領域内に収まる範囲）
  const descriptorsHtml = f.odorDescriptors.slice(0, 6).map(d => `<span class="tag">${esc(d)}</span>`).join('')
    + (f.odorDescriptors.length > 6 ? `<span class="tag" style="opacity:0.6;">+${f.odorDescriptors.length - 6}</span>` : '');

  return `
    <div class="list-thumb">${imageHtml}</div>
    <div class="list-main">
      <div class="list-furigana">${esc(f.furigana || '')}</div>
      <div class="list-name">${esc(f.name)}</div>
      <div class="list-type-tags">
        <span class="type-tag category">${esc(f.category)}</span>
        <span class="type-tag type">${esc(f.type)}</span>
      </div>
    </div>
    <div class="list-descriptors">${descriptorsHtml}</div>
    <div class="list-stats">
      <div class="list-stat-cell">
        <div class="list-stat-value">${esc(f.volatility.position)}</div>
        <div class="list-stat-sub">${esc(f.volatility.time)}</div>
      </div>
      <div class="list-stat-cell">
        <div class="list-stat-value">${esc(f.odorImpact.level)}</div>
        <div class="list-stat-sub">${esc(f.odorImpact.concentration)}</div>
      </div>
      <div class="list-stat-cell">
        <div class="list-stat-value">${esc(f.ifraLimit.value)}</div>
        <div class="list-stat-sub">${esc(f.ifraLimit.category)}</div>
      </div>
      <div class="list-stat-cell">
        <div class="list-stat-value mono">${esc(f.cas)}</div>
        <div class="list-stat-sub">${esc(f.casSource || '')}</div>
      </div>
    </div>
  `;
}

/* ═══════════════════════════════════════════
   モーダル
═══════════════════════════════════════════ */
function openModal(f) {
  const img = document.getElementById('m-image');
  const placeholder = document.getElementById('m-image-placeholder');

  if (f.image) {
    img.src = f.image;
    img.alt = f.name;
    img.style.display = 'block';
    placeholder.style.display = 'none';
    img.onerror = () => {
      img.style.display = 'none';
      placeholder.style.display = 'flex';
    };
  } else {
    img.style.display = 'none';
    placeholder.style.display = 'flex';
  }

  document.getElementById('m-furigana').textContent = f.furigana || '';
  document.getElementById('m-name').textContent = f.name;
  document.getElementById('m-tag-category').textContent = f.category;
  document.getElementById('m-tag-type').textContent = f.type;

  document.getElementById('m-cas').textContent = `CAS ${f.cas}  ·  ${f.casSource || ''}`;

  document.getElementById('m-vol').textContent = f.volatility.position;
  document.getElementById('m-vol-pos').textContent = f.volatility.time;
  document.getElementById('m-impact').textContent = f.odorImpact.level;
  document.getElementById('m-impact-lv').textContent = f.odorImpact.concentration;
  document.getElementById('m-ifra').textContent = f.ifraLimit.value;
  document.getElementById('m-ifra-cat').textContent = f.ifraLimit.category;

  document.getElementById('m-description').textContent = f.description || '（未記入）';
  document.getElementById('m-usage').textContent = f.usage || '（未記入）';

  document.getElementById('m-descriptors').innerHTML = f.odorDescriptors.map(d => `<span class="tag">${esc(d)}</span>`).join('');
  document.getElementById('m-blends').innerHTML = f.blendsWith.map(b => `<span class="blend-tag">${esc(b)}</span>`).join('');
  document.getElementById('m-blends-count').textContent = `${f.blendsWith.length} items`;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

loadEncData();
</script>
</body>
</html>
